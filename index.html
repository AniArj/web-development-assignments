<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Solutions - Interactive Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>TaskFlow Solutions</h1>
        <p>Interactive Task Manager</p>
    </header>

    <main class="container">
        <section class="form-section">
            <form id="taskForm">
                <div class="form-group">
                    <label for="taskName">Task Name:</label>
                    <input type="text" id="taskName" placeholder="Enter task name..." required>
                </div>

                <div class="form-group">
                    <label for="taskPriority">Priority:</label>
                    <select id="taskPriority">
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>

                <div class="form-checkboxes">
                    <label>
                        <input type="checkbox" id="taskImportant"> Mark as Important
                    </label>
                    <label>
                        <input type="checkbox" id="taskCompleted"> Mark as Completed
                    </label>
                </div>

                <button type="submit" id="submitBtn">Add Task</button>
            </form>
        </section>

        <section class="display-section">
            <h2>Your Tasks</h2>
            <div id="taskmanager"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
